name: SaaC DeviL Kernel Exec

on:
  push:
    branches: [ "main" ]

jobs:
  run-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Polyglot Script
        run: |
          jssh_bridge_stream() {
              exec 3<&0
              if command -v jssh &>/dev/null; then
                  jssh "$@" <&3
              else
                  cat <&3
              fi
              exec 3<&-
          }
