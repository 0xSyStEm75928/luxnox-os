name: God Eye Audit Engine (Read-Only Safety Edition)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  inspect-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read # 書き込み権限を遮断して不正Pushを防止

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Runtimes
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Static Code Analysis & Integrity Check
        run: |
          set -euo pipefail
          echo "=== Executing Safe Integrity Audit ==="
          
          python3 -c '
          import os, glob

          files = glob.glob("**/*.py", recursive=True) + glob.glob("**/*.js", recursive=True) + glob.glob("**/*.sh", recursive=True)
          print(f"[INFO] Auditing {len(files)} source files...")
          
          # 破綻したインラインコードや危険なプロセスコールがないか検査
          for f in files:
              with open(f, "r", encoding="utf-8", errors="ignore") as fp:
                  content = fp.read()
                  if "git push" in content and f.endswith(".yml"):
                      print(f"[WARNING] Unsafe auto-push found in: {f}")
          print("[SUCCESS] Audit completed with zero state mutations.")
          '
